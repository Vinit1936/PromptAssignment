<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile | TalentDeck</title>
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/navbar.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/animations.css" />
    <link rel="stylesheet" href="css/dark-mode.css" />
    <link rel="stylesheet" href="css/pages/profile.css" />
</head>

<body>
    <div class="navbar-wrapper">
        <nav class="nav-dock">
            <a class="nav-brand" href="index.html" aria-label="TalentDeck home">
                <svg width="28" height="28" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="4" y="4" width="24" height="24" rx="8" fill="currentColor" opacity="0.08" />
                    <path d="M10 22V10h6a4 4 0 1 1 0 8h-4v4z" fill="currentColor" />
                </svg>
                <span>TalentDeck</span>
            </a>
            <div class="nav-links">
                <a data-nav-link href="explore.html">Explore</a>
                <a data-nav-link href="dashboard.html">Dashboard</a>
                <a data-nav-link href="connections.html">Connections</a>
            </div>
            <div class="nav-actions">
                <button class="icon-button" aria-label="Search"><img src="assets/icons/search.svg" width="18"
                        height="18" alt="" /></button>
                <button class="icon-button" aria-label="Notifications"><img src="assets/icons/bell.svg" width="18"
                        height="18" alt="" /></button>
                <button class="theme-toggle" data-theme-toggle aria-label="Toggle theme"><span class="sr-only">Toggle
                        theme</span><img class="theme-toggle__icon theme-toggle__icon--sun" src="assets/icons/sun.svg"
                        alt="" /><img class="theme-toggle__icon theme-toggle__icon--moon" src="assets/icons/moon.svg"
                        alt="" /><span class="theme-toggle__thumb"></span></button>
                <a class="btn btn-primary" href="login.html">Sign In</a>
            </div>
        </nav>
    </div>
    <div class="mobile-dock">
        <a class="mobile-dock__item" href="index.html" aria-label="Home"><img src="assets/icons/grid.svg" width="18"
                height="18" alt="" /></a>
        <a class="mobile-dock__item" href="explore.html" aria-label="Explore"><img src="assets/icons/search.svg"
                width="18" height="18" alt="" /></a>
        <a class="mobile-dock__item" href="dashboard.html" aria-label="Dashboard"><img src="assets/icons/user.svg"
                width="18" height="18" alt="" /></a>
        <a class="mobile-dock__item" href="connections.html" aria-label="Connections"><img src="assets/icons/people.svg"
                width="18" height="18" alt="" /></a>
        <a class="mobile-dock__item" href="create-profile.html" aria-label="Create profile"><img
                src="assets/icons/plus.svg" width="18" height="18" alt="" /></a>
    </div>

    <main class="container">
        <header class="profile-header animate-fade-up">
            <div class="profile-cover"></div>
            <div class="profile-meta">
                <div class="profile-avatar" data-avatar></div>
                <div class="profile-meta__text">
                    <div class="flex-between" style="align-items:flex-start; gap:12px; flex-wrap:wrap;">
                        <div>
                            <h1 data-name></h1>
                            <p class="text-secondary" data-title></p>
                            <div class="text-muted" style="display:flex; gap:6px; align-items:center;"><img
                                    src="assets/icons/pin.svg" width="14" height="14" alt="" /><span
                                    data-location></span></div>
                        </div>
                        <div class="profile-actions">
                            <span class="badge badge-success" data-availability></span>
                            <button class="btn btn-primary" data-reachout-btn>Reach Out</button>
                            <button class="btn btn-outline"><img src="assets/icons/bookmark.svg" width="14" height="14"
                                    alt="" /> Save</button>
                        </div>
                    </div>
                    <p class="text-secondary" data-tagline></p>
                    <div class="social-links" data-socials>
                        <a data-github href="#" aria-label="GitHub"><img src="assets/icons/github.svg" width="16"
                                height="16" alt="" /></a>
                        <a data-linkedin href="#" aria-label="LinkedIn"><img src="assets/icons/linkedin.svg" width="16"
                                height="16" alt="" /></a>
                        <a data-website href="#" aria-label="Website"><img src="assets/icons/globe.svg" width="16"
                                height="16" alt="" /></a>
                    </div>
                </div>
            </div>
        </header>

        <section class="profile-section animate-fade-up">
            <h3 class="section-title">About</h3>
            <p data-bio></p>
        </section>

        <section class="profile-section animate-fade-up">
            <h3 class="section-title">Skills</h3>
            <div data-skills></div>
        </section>

        <section class="profile-section animate-fade-up">
            <h3 class="section-title">Experience</h3>
            <div class="timeline" data-experience></div>
        </section>

        <section class="profile-section animate-fade-up">
            <h3 class="section-title">Projects</h3>
            <div class="project-grid" data-projects></div>
        </section>

        <section class="profile-section animate-fade-up">
            <h3 class="section-title">Education</h3>
            <p data-education></p>
        </section>

        <section class="profile-section animate-fade-up">
            <h3 class="section-title">What I'm Looking For</h3>
            <div class="chip-grid" data-preferences></div>
        </section>
    </main>

    <div class="modal-overlay" id="reachout-modal">
        <div class="modal">
            <button class="modal__close" data-modal-close="reachout-modal" aria-label="Close"><img
                    src="assets/icons/chevron-right.svg" width="14" height="14" alt=""
                    style="transform:rotate(180deg)" /></button>
            <h3>Reach Out</h3>
            <form data-reachout-form>
                <input class="input" type="text" placeholder="Your name" required />
                <input class="input" type="text" placeholder="Company" required />
                <textarea class="textarea" rows="4" maxlength="500" placeholder="Message" required></textarea>
                <div class="counter" data-counter>0/500</div>
                <button class="btn btn-primary" type="submit">Send</button>
            </form>
        </div>
    </div>

    <script src="js/theme.js" type="module"></script>
    <script src="js/navbar.js" type="module"></script>
    <script src="js/navAuth.js" type="module"></script>
    <script src="js/animations.js" type="module"></script>
    <script src="js/components/modal.js" type="module"></script>
    <script src="js/pages/profile.js" type="module"></script>
</body>

</html>
