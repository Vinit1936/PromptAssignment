<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | TalentDeck</title>
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/navbar.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/animations.css" />
    <link rel="stylesheet" href="css/dark-mode.css" />
    <link rel="stylesheet" href="css/pages/login.css" />
</head>

<body>
    <div class="navbar-wrapper">
        <nav class="nav-dock">
            <a class="nav-brand" href="index.html" aria-label="TalentDeck home">
                <svg width="28" height="28" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="4" y="4" width="24" height="24" rx="8" fill="currentColor" opacity="0.08" />
                    <path d="M10 22V10h6a4 4 0 1 1 0 8h-4v4z" fill="currentColor" />
                </svg>
                <span>TalentDeck</span>
            </a>
            <div class="nav-links">
                <a data-nav-link href="explore.html">Explore</a>
                <a data-nav-link href="dashboard.html">Dashboard</a>
                <a data-nav-link href="connections.html">Connections</a>
            </div>
            <div class="nav-actions">
                <button class="icon-button" aria-label="Search"><img src="assets/icons/search.svg" width="18"
                        height="18" alt="" /></button>
                <button class="icon-button" aria-label="Notifications"><img src="assets/icons/bell.svg" width="18"
                        height="18" alt="" /></button>
                <button class="theme-toggle" data-theme-toggle aria-label="Toggle theme"><span class="sr-only">Toggle
                        theme</span><img class="theme-toggle__icon theme-toggle__icon--sun" src="assets/icons/sun.svg"
                        alt="" /><img class="theme-toggle__icon theme-toggle__icon--moon" src="assets/icons/moon.svg"
                        alt="" /><span class="theme-toggle__thumb"></span></button>
                <a class="btn btn-primary" href="login.html">Sign In</a>
            </div>
        </nav>
    </div>
    <div class="mobile-dock">
        <a class="mobile-dock__item" href="index.html" aria-label="Home"><img src="assets/icons/grid.svg" width="18"
                height="18" alt="" /></a>
        <a class="mobile-dock__item" href="explore.html" aria-label="Explore"><img src="assets/icons/search.svg"
                width="18" height="18" alt="" /></a>
        <a class="mobile-dock__item" href="dashboard.html" aria-label="Dashboard"><img src="assets/icons/user.svg"
                width="18" height="18" alt="" /></a>
        <a class="mobile-dock__item" href="connections.html" aria-label="Connections"><img src="assets/icons/people.svg"
                width="18" height="18" alt="" /></a>
        <a class="mobile-dock__item" href="create-profile.html" aria-label="Create profile"><img
                src="assets/icons/plus.svg" width="18" height="18" alt="" /></a>
    </div>

    <main class="auth-layout">
        <div class="auth-visual">
            <div class="auth-visual__logo">
                <img src="assets/icons/grid.svg" width="18" height="18" alt="" />
                <span>TalentDeck</span>
            </div>
            <div class="auth-visual__art">
                <svg width="180" height="120" viewBox="0 0 220 140" fill="none" xmlns="http://www.w3.org/2000/svg"
                    aria-hidden="true">
                    <rect x="20" y="20" width="80" height="50" rx="10" fill="var(--surface)" stroke="var(--border)" />
                    <rect x="120" y="60" width="80" height="50" rx="10" fill="var(--surface)" stroke="var(--border)" />
                    <path d="M60 70 C90 100 130 40 170 70" stroke="var(--text-muted)" stroke-width="2"
                        stroke-dasharray="6 6" />
                </svg>
            </div>
            <p class="text-secondary">“TalentDeck helped us find aligned builders faster than any board.”</p>
        </div>

        <section class="auth-form">
            <div class="auth-card">
                <div class="tabs auth-tabs">
                    <button class="tab active" data-auth-tab="signin">Sign In</button>
                    <button class="tab" data-auth-tab="signup">Sign Up</button>
                </div>

                <form class="auth-fields active" data-auth-panel="signin" data-signin>
                    <label>Email<input class="input" type="email" required /></label>
                    <label>Password<div style="position:relative;"><input class="input" type="password"
                                required /><button type="button" class="icon-button" data-eye
                                style="position:absolute; right:6px; top:6px; width:32px; height:32px;"><img
                                    src="assets/icons/eye.svg" width="14" height="14" alt="" /></button></div></label>
                    <div class="inline">
                        <label><input type="checkbox" /> Remember me</label>
                        <a class="text-muted" href="#">Forgot password?</a>
                    </div>
                    <button class="btn btn-primary" type="submit">Sign In</button>
                    <div class="divider"></div>
                    <button class="oauth-btn"><img src="assets/icons/google.svg" width="16" height="16" alt="" />
                        Continue with Google</button>
                    <button class="oauth-btn"><img src="assets/icons/github.svg" width="16" height="16" alt="" />
                        Continue with GitHub</button>
                    <p class="text-secondary">Don't have an account? <a href="#" data-auth-tab="signup">Sign Up</a></p>
                </form>

                <form class="auth-fields" data-auth-panel="signup" data-signup>
                    <label>Full name<input class="input" type="text" required /></label>
                    <label>Email<input class="input" type="email" required /></label>
                    <label>Password<div class="strength">
                            <div class="strength__fill"></div>
                        </div>
                        <div style="position:relative;"><input class="input" type="password" data-password
                                required /><button type="button" class="icon-button" data-eye
                                style="position:absolute; right:6px; top:6px; width:32px; height:32px;"><img
                                    src="assets/icons/eye.svg" width="14" height="14" alt="" /></button></div>
                    </label>
                    <div class="role-toggle">
                        <div class="role-card active">I'm a Talent</div>
                        <div class="role-card">I'm a Recruiter</div>
                    </div>
                    <label><input type="checkbox" required /> I agree to terms</label>
                    <button class="btn btn-primary" type="submit">Create Account</button>
                    <div class="divider"></div>
                    <button class="oauth-btn"><img src="assets/icons/google.svg" width="16" height="16" alt="" />
                        Continue with Google</button>
                    <button class="oauth-btn"><img src="assets/icons/github.svg" width="16" height="16" alt="" />
                        Continue with GitHub</button>
                </form>
            </div>
        </section>
    </main>

    <script src="js/theme.js" type="module"></script>
    <script src="js/navbar.js" type="module"></script>
    <script src="js/navAuth.js" type="module"></script>
    <script src="js/animations.js" type="module"></script>
    <script src="js/pages/login.js" type="module"></script>
</body>

</html>
